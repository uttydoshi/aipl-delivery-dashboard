name: Model Deprecation Check

on:
  schedule:
    # Runs daily at 9am AEST (11pm UTC previous day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  check-deprecations:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        id: scrape
        run: node scripts/scrape-deprecations.js
        continue-on-error: true

      - name: Alert on scrape failure
        if: steps.scrape.outcome == 'failure'
        run: |
          echo "⚠️ Scraper failed — model-deprecations.json may be stale."
          echo "Manual check recommended:"
          echo "  AWS:    https://docs.aws.amazon.com/bedrock/latest/userguide/model-lifecycle.html"
          echo "  AWS:    https://docs.aws.amazon.com/bedrock/latest/userguide/foundation-models.html"
          echo "  Google: https://cloud.google.com/vertex-ai/generative-ai/docs/learn/model-versioning"
          # TODO: SLACK — uncomment when SLACK_WEBHOOK_URL secret is configured
          # CHANNEL="temp_help_ai_platform"
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"channel\":\"#${CHANNEL}\",\"text\":\"⚠️ *AI Platform Control Center*: Model deprecation scraper failed. Please manually check:\n• <https://docs.aws.amazon.com/bedrock/latest/userguide/model-lifecycle.html|AWS Bedrock lifecycle>\n• <https://cloud.google.com/vertex-ai/generative-ai/docs/learn/model-versioning|Google Vertex AI versions>\"}"

      - name: Commit updated deprecation data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add model-deprecations.json
          git diff --staged --quiet || git commit -m "chore: update model deprecation dates [skip ci]"
          git push
        continue-on-error: true

      - name: Check for upcoming deprecations
        id: check
        run: node scripts/check-deprecations.js
        continue-on-error: true

      - name: Alert on urgent deprecations
        if: steps.check.outcome == 'failure'
        run: |
          echo "🔴 URGENT: One or more models deprecating within 30 days!"
          # TODO: SLACK — uncomment when SLACK_WEBHOOK_URL secret is configured
          # CHANNEL="temp_help_ai_platform"
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"channel\":\"#${CHANNEL}\",\"text\":\"🔴 *URGENT — LLM Model Deprecation*: One or more models are deprecating within 30 days. Check the dashboard.\"}"

      - name: Alert on workflow failure
        if: failure()
        run: |
          echo "❌ Deprecation check workflow encountered an unexpected error."
          # TODO: SLACK — uncomment when SLACK_WEBHOOK_URL secret is configured
          # CHANNEL="temp_help_ai_platform"
          # curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
          #   -H 'Content-type: application/json' \
          #   --data "{\"channel\":\"#${CHANNEL}\",\"text\":\"❌ *AI Platform Control Center*: Daily deprecation check workflow failed. <https://github.com/uttydoshi/ai-platform-control-center/actions|Check GitHub Actions>\"}"
