<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Model Deprecations · AI Platform Control Center</title>
<script src="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/gridjs.umd.js" integrity="sha384-/XXDzxe4FsGiAe50i/u9pY/Vy/uX654MHB1xoc1BJNnH1WXHhqHga9g3q5tF4gj7" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridjs@5.0.2/dist/theme/mermaid.min.css" integrity="sha384-K3RzVFnmHBqPN4NdFRDNi6RSnLpg83l/J3x0MXvTlDNEZj/bq0NvgDp/GN7KDVG" crossorigin="anonymous">
<style>
  :root { color-scheme: light; --bg: #f8f9fb; --surface: #fff; --border: #e5e7eb; --text: #1a1a2e; --text-muted: #6b7280; --text-faint: #9ca3af; --input-bg: #fff; --grid-head: #f3f4f6; --grid-hover: #f9fafb; }
  body.dark { color-scheme: dark; --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #f1f5f9; --text-muted: #e2e8f0; --text-faint: #cbd5e1; --input-bg: #1e293b; --grid-head: #1e293b; --grid-hover: #334155; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 24px; }
  .page-wrapper { max-width: 1400px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .summary-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; min-width: 140px; }
  .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--text); margin-top: 4px; }
  .stat-card .unit { font-size: 12px; color: var(--text-faint); }
  .controls { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .controls select { border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-size: 13px; background: var(--input-bg); color: var(--text); }
  #grid-container .gridjs-container { border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  #grid-container .gridjs-head { background: var(--grid-head); }
  #grid-container .gridjs-th { font-size: 12px; font-weight: 600; color: var(--text); padding: 10px 12px; text-align: left; vertical-align: middle; }
  #grid-container .gridjs-th-content { display: inline; vertical-align: middle; }
  #grid-container .gridjs-sort { display: inline-flex !important; vertical-align: middle; margin-left: 4px; }
  #grid-container .gridjs-sort-neutral::before, #grid-container .gridjs-sort-neutral::after { border-color: #111827 transparent; }
  #grid-container .gridjs-sort-asc::before { border-color: transparent transparent #111827; }
  #grid-container .gridjs-sort-desc::after { border-color: #111827 transparent transparent; }
  body.dark #grid-container .gridjs-sort-neutral::before, body.dark #grid-container .gridjs-sort-neutral::after { border-color: #f1f5f9 transparent; }
  body.dark #grid-container .gridjs-sort-asc::before { border-color: transparent transparent #f1f5f9; }
  body.dark #grid-container .gridjs-sort-desc::after { border-color: #f1f5f9 transparent transparent; }
  #grid-container .gridjs-td { font-size: 12px; padding: 10px 12px; vertical-align: middle; }
  #grid-container .gridjs-tr:hover td { background: var(--grid-hover); }
  #grid-container .gridjs-pagination { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; padding: 10px 12px; }
  #grid-container .gridjs-pagination button { margin: 0 4px; }
  #grid-container .gridjs-pagination button.gridjs-currentPage { font-weight: 700; }
  body.dark #grid-container .gridjs-container { background: var(--surface); border-color: var(--border); }
  body.dark #grid-container .gridjs-head { background: var(--grid-head); }
  body.dark #grid-container .gridjs-th { color: var(--text); background: var(--grid-head); }
  body.dark #grid-container .gridjs-td { color: var(--text); background: var(--surface); }
  body.dark #grid-container .gridjs-tr:hover td { background: var(--grid-hover); }
  body.dark #grid-container .gridjs-footer { background: var(--surface); border-color: var(--border); }
  body.dark #grid-container .gridjs-pagination button { background: var(--surface); color: var(--text); border-color: var(--border); }
  .urgency-badge { display: inline-flex; align-items: center; gap: 5px; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; }
  .urgent  { background: #fee2e2; color: #991b1b; }
  .warning { background: #ffedd5; color: #9a3412; }
  .safe    { background: #dcfce7; color: #166534; }
  .past    { background: #f3f4f6; color: #6b7280; }
  .provider-badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }
  .aws    { background: #fff7ed; color: #c2410c; }
  .google { background: #eff6ff; color: #1d4ed8; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  .last-updated { font-size: 12px; color: var(--text-faint); }
  .scrape-status { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; }
  .scrape-ok      { background: #dcfce7; color: #166534; }
  .scrape-partial { background: #ffedd5; color: #9a3412; }
  .scrape-manual  { background: #f3f4f6; color: #6b7280; }
</style>
</head>
<body>

<div style="position:fixed;top:16px;right:20px;z-index:100;">
  <button id="theme-toggle" onclick="toggleTheme()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 1px 4px rgba(0,0,0,0.08);">
    <span id="theme-icon">🌙</span><span id="theme-label">Dark</span>
  </button>
</div>

<div class="page-wrapper">

<a href="/" style="font-size:12px;color:#6366f1;text-decoration:none;display:inline-block;margin-bottom:16px;">← Home</a>

<h1>🗓️ Model Deprecation Tracker</h1>
<p class="subtitle">Deprecation dates for AWS Bedrock and Google Vertex AI models · auto-updated daily</p>

<div id="summary" class="summary-bar"></div>

<div class="meta-row">
  <div class="controls">
    <select id="provider-filter"><option value="">All providers</option></select>
    <select id="status-filter">
      <option value="">All statuses</option>
      <option value="urgent">🔴 Urgent (&lt;30 days)</option>
      <option value="warning">🟠 Warning (&lt;90 days)</option>
      <option value="safe">🟢 Safe</option>
      <option value="past">💀 Already deprecated</option>
    </select>
  </div>
  <div>
    <span id="last-updated" class="last-updated"></span>
    <span id="scrape-status" class="scrape-status" style="margin-left:8px;"></span>
  </div>
</div>

<div id="grid-container"></div>

</div>

<script>
let allModels = [];
let grid = null;
let providerFilter = '';
let statusFilter = '';

function daysUntil(dateStr) {
  if (!dateStr || dateStr === '9999-12-31') return 99999;
  const target = new Date(dateStr);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((target - now) / 86400000);
}

// For urgency, always use EOL date (most important date for users)
function daysUntilEol(model) {
  return daysUntil(model.end_of_life_date);
}

function urgencyLabel(days, dateStr) {
  if (dateStr === '9999-12-31') return { label: '🟢 No date set', cls: 'safe' };
  if (days < 0)   return { label: '💀 Deprecated', cls: 'past' };
  if (days <= 30)  return { label: `🔴 ${days}d`, cls: 'urgent' };
  if (days <= 90)  return { label: `🟠 ${days}d`, cls: 'warning' };
  return           { label: `🟢 ${days}d`, cls: 'safe' };
}

function urgencyKey(days) {
  if (days < 0)  return 3;
  if (days <= 30) return 0;
  if (days <= 90) return 1;
  return 2;
}

function filterModels() {
  return allModels.filter(m => {
    const days = daysUntil(m.deprecation_date);
    if (providerFilter && m.provider !== providerFilter) return false;
    const days = daysUntilEol(m);
    if (statusFilter === 'urgent'  && !(days >= 0 && days <= 30))  return false;
    if (statusFilter === 'warning' && !(days > 30 && days <= 90))  return false;
    if (statusFilter === 'safe'    && days <= 90)                  return false;
    if (statusFilter === 'past'    && days >= 0)                   return false;
    return true;
  });
}

function renderSummary(models) {
  const urgent  = models.filter(m => { const d = daysUntilEol(m); return d >= 0 && d <= 30; }).length;
  const warning = models.filter(m => { const d = daysUntilEol(m); return d > 30 && d <= 90; }).length;
  const safe    = models.filter(m => daysUntilEol(m) > 90).length;
  const past    = models.filter(m => daysUntilEol(m) < 0).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat-card"><div class="label">Total Models</div><div class="value">${models.length}</div></div>
    <div class="stat-card"><div class="label">🔴 Urgent</div><div class="value" style="color:#dc2626">${urgent}</div></div>
    <div class="stat-card"><div class="label">🟠 Warning</div><div class="value" style="color:#ea580c">${warning}</div></div>
    <div class="stat-card"><div class="label">🟢 Safe</div><div class="value" style="color:#16a34a">${safe}</div></div>
    <div class="stat-card"><div class="label">💀 Deprecated</div><div class="value" style="color:#9ca3af">${past}</div></div>
  `;
}

function renderGrid(models) {
  const sorted = [...models].sort((a, b) => urgencyKey(daysUntilEol(a)) - urgencyKey(daysUntilEol(b)) || daysUntilEol(a) - daysUntilEol(b));

  const data = sorted.map(m => {
    const days = daysUntilEol(m);
    const urg = urgencyLabel(days, m.end_of_life_date);
    const provCls = m.provider.includes('AWS') ? 'aws' : 'google';
    const fmtDate = d => (!d || d === '9999-12-31') ? 'TBD' : d;
    return [
      m.model_name,
      m.model_id,
      gridjs.html(`<span class="provider-badge ${provCls}">${m.provider}</span>`),
      fmtDate(m.deprecation_date),
      fmtDate(m.end_of_life_date),
      gridjs.html(`<span class="urgency-badge ${urg.cls}">${urg.label}</span>`),
      m.notes || '—',
    ];
  });

  const columns = [
    { name: 'Model Name', width: '18%' },
    { name: 'Model ID', width: '22%' },
    { name: 'Provider', width: '14%', sort: false },
    { name: 'Deprecation Date', width: '13%' },
    { name: 'End of Life', width: '13%' },
    { name: 'Status', width: '10%', sort: false },
    { name: 'Notes', width: '12%', sort: false },
  ];

  if (grid) {
    grid.updateConfig({ columns, data }).forceRender();
  } else {
    grid = new gridjs.Grid({ columns, data, sort: true, pagination: { limit: 20, buttonsCount: 20 } });
    grid.render(document.getElementById('grid-container'));
  }
}

async function loadData() {
  const res = await fetch('/model-deprecations.json');
  const data = await res.json();
  allModels = data.models || [];

  // Populate provider filter
  const providers = [...new Set(allModels.map(m => m.provider))].sort();
  const sel = document.getElementById('provider-filter');
  providers.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });

  // Meta info
  document.getElementById('last-updated').textContent = `Last updated: ${new Date(data.last_updated).toLocaleDateString('en-AU', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' })}`;
  const ss = document.getElementById('scrape-status');
  const statusMap = { success: ['scrape-ok', '✅ Auto-updated'], partial_failure: ['scrape-partial', '⚠️ Partial scrape'], manual: ['scrape-manual', '📝 Manual'] };
  const [cls, label] = statusMap[data.scrape_status] || ['scrape-manual', '📝 Manual'];
  ss.className = `scrape-status ${cls}`;
  ss.textContent = label;

  const filtered = filterModels();
  renderSummary(filtered);
  renderGrid(filtered);
}

document.getElementById('provider-filter').addEventListener('change', e => {
  providerFilter = e.target.value;
  const f = filterModels(); renderSummary(f); renderGrid(f);
});
document.getElementById('status-filter').addEventListener('change', e => {
  statusFilter = e.target.value;
  const f = filterModels(); renderSummary(f); renderGrid(f);
});

loadData().catch(err => {
  document.getElementById('grid-container').innerHTML = `<p style="color:#dc2626;padding:20px">Error loading data: ${err.message}</p>`;
});

// Theme
function toggleTheme() {
  const isDark = document.body.classList.toggle('dark');
  document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
  document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
  document.body.classList.add('dark');
  document.getElementById('theme-icon').textContent = '☀️';
  document.getElementById('theme-label').textContent = 'Light';
}
</script>
</body>
</html>
